conda_environment: "workflow/envs/nextstrain.yaml"

genesforglycosylation: ["G", "F"]

# if the build name has a "-" in it, then the pipeline assumes
# the gene is the part before the first "-", so "F-antibody-escape"
# is parsed as the gene "F".
builds_to_run: ["genome", "G", "F", "F-antibody-escape"]

resolutions_to_run: ["all-time", "6y", "3y"]

subtypes: ['a', 'b']

# Both files must have a {a_or_b} expandable field to be replaced by "a" or "b"
# depending on if they are specified in the `subtypes` param above
inputs:
  - name: ppx_open
    metadata: "https://data.nextstrain.org/files/workflows/rsv/{a_or_b}/metadata.tsv.gz"
    sequences: "https://data.nextstrain.org/files/workflows/rsv/{a_or_b}/sequences.fasta.xz"
  - name: ppx_restricted
    metadata: "https://data.nextstrain.org/files/workflows/rsv/{a_or_b}/metadata_restricted.tsv.gz"
    sequences: "https://data.nextstrain.org/files/workflows/rsv/{a_or_b}/sequences_restricted.fasta.xz"

exclude: "config/outliers_ppx.txt"

description: "config/description.md"

strain_id_field: "accession"
display_strain_field: "strain"

# This section describes the subsampling options for various datasets produced
# by this workflow.
#
# The datasets are determined by taking the cross-product of subtype category
# (`subtypes`), gene category (`builds`) and time category (`resolutions`).
# What's actually run is determined by `subtypes`, `builds_to_run`, and
# `resolutions_to_run`.
#
# The config structure differs from the standard augur subsample config schema
# to concisely support the nature of cross-product. Each category has an entry
# in the matrix. `resolutions`, as the most granular category, contains the
# actual `samples` structure that corresponds to `samples` in the standard augur
# subsample config schema. Options from other categories are taken as defaults
# as needed, the order of importance matching the category's order of
# granularity with respect to others.
#
# Q: What if an option is specified in multiple categories?
#
#   1. If the option is 'query' or 'exclude_where', values from all categories
#      will be applied.
#   2. Otherwise, only the value given in the most granular category is used.
#      This is further customizable using a `sample_overrides` section. Those
#      options override options in `resolutions`, but note that they need to
#      account for all possible `samples`. Example:
#
#        F-antibody-escape:
#          min_length: 1200
#          query: F_coverage>0.75
#          sample_overrides:
#            all-time:
#              max_sequences: 2000
#            recent:
#              max_sequences: 2000
#            background:
#              max_sequences: 200
#
# Q: How to customize this in user config?
#
#   1. Use the matrix below with modifications. The example below sets a custom
#      group_by for all datasets, and max_sequences for 6y:
#
#        subsample_matrix:
#          defaults:
#            group_by:
#              - year
#              - country
#              - division
#          resolutions:
#            6y:
#              samples:
#                recent:
#                  max_sequences: 3000
#
#   2. Define a custom matrix using `custom_subsample_matrix`.
#
# For debugging purposes, refer to the generated augur subsample schema files
# under the results folder. Paths to these files are noted in the first lines of
# Snakemake output.
subsample_matrix:
  defaults:
    query: missing_data<1000
    exclude: "config/outliers_ppx.txt"
    exclude_where:
      - qc.overallStatus=bad
    group_by:
      - year
      - country

  subtypes:
    a:
      query: clade.str.startswith("A.D", na=False)
    b:
      query: clade.str.startswith("B.D", na=False)

  builds:
    genome:
      min_length: 10000
      query: genome_coverage>0.3
    G:
      min_length: 600
      query: G_coverage>0.3
    F:
      min_length: 1200
      query: F_coverage>0.3
    F-antibody-escape:
      min_length: 1200
      query: F_coverage>0.75
      sample_overrides:
        all-time:
          max_sequences: 2000
        recent:
          max_sequences: 2000
        background:
          max_sequences: 200

  resolutions:
    all-time:
      samples:
        all-time:
          min_date: 1975-01-01
          max_sequences: 3000
    6y:
      samples:
        recent:
          min_date: 6Y
          max_sequences: 3000
        background:
          min_date: 12Y
          max_date: 6Y
          exclude_where:
            - qc.overallStatus=mediocre
          max_sequences: 300
    3y:
      samples:
        recent:
          min_date: 3Y
          max_sequences: 3000
        background:
          min_date: 12Y
          max_date: 3Y
          exclude_where:
            - qc.overallStatus=mediocre
          max_sequences: 300
    1y:
      samples:
        recent:
          min_date: 1Y
          max_sequences: 3000
        background:
          min_date: 12Y
          max_date: 1Y
          exclude_where:
            - qc.overallStatus=mediocre
          max_sequences: 300

files:
  auspice_config: "config/auspice_config.json"
  auspice_config_additional_colorings: "config/auspice_config_additional_colorings.json"
  auspice_config_f_antibody_escape: "config/auspice_config_dms-defaults.json"
  auspice_config_non-genome_builds: "config/auspice_config_non-genome.json"

refine:
  coalescent: "opt"
  date_inference: "marginal"
  clock_filter_iqd: 4

ancestral:
  inference: "joint"

cds:
  F: "F"
  G: "G"
  genome: "F"
  F-antibody-escape: "F"

traits:
  columns: "country region"

frequencies:
  resolutions:
    all-time:
      min_date: 1975-01-01
    6y:
      min_date: 6Y
    3y:
      min_date: 3Y

nextclade_attributes:
  a:
    name: "RSV-A NextClade using real-time tree"
    reference_name: "hRSV/A/England/397/2017"
    accession: "EPI_ISL_412866"
  b:
    name: "RSV-B NextClade using real-time tree"
    reference_name: "hRSV/B/Australia/VIC-RCH056/2019"
    accession: "EPI_ISL_1653999"

filter_for_pre_subsample_alignment:
  min_length:
    genome: 10000
    G: 600
    F: 1200
    F-antibody-escape: 1200
  min_coverage:
    genome: 0.3
    G: 0.3
    F: 0.3
    F-antibody-escape: 0.75
  resolutions:
    all-time:
      min_date: 1975-01-01
    6y:
      min_date: 12Y
    3y:
      min_date: 12Y
    1y:
      min_date: 12Y

# configuration specific to the F deep mutational scanning antibody escape data
f_dms_data: dms-data/all_antibodies.csv
f_dms_antibodies:  # columns in `f_dms_data` with per-mutation escape
  - Clesrovimab-Fab
  - Clesrovimab-IgG
  - Nirsevimab-Fab
  - Nirsevimab-IgG
dms_only_positive_escape: true  # for DMS escape values, set any values < 0 to 0
enrich_antibody_escape:  # additional filtering for antibody escape sequences added to tree
  F-antibody-escape:  # for this build, enrich by these criteria
    nseqs_per_antibody_scoretype: 500  # add this many sequences for each antibody for total and max escape
    group_by: [country, year]  # group by these variables
    max_identical_f_prot_muts: 2  # for each group, no more than this many w identical F protein mutations
    max_identical_max_escape_mut: 6  # for each group, no more than this many w same top F escape mutation

